# A generic, single database configuration.

[alembic]

# Path to migration scripts
script_location = alembic

# Version file template
file_template = %%(rev)s_%%(slug)s

# Use current working directory
prepend_sys_path = .

# Timezone
timezone = UTC

# Version locations
version_locations = %(here)s/alembic/versions

# Path separator
version_path_separator = os

# Placeholder URL
# Actual URL is loaded from app.core.config.settings
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/inventory_db


# ==================================================
# Logging
# ==================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


# ==================================================
# Root Logger
# ==================================================

[logger_root]
level = WARN
handlers = console
qualname =


# ==================================================
# SQLAlchemy Logger
# ==================================================

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


# ==================================================
# Alembic Logger
# ==================================================

[logger_alembic]
level = INFO
handlers =
qualname = alembic


# ==================================================
# Console Handler
# ==================================================

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


# ==================================================
# Formatter
# ==================================================

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S